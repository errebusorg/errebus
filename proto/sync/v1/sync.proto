syntax = "proto3";

package sync.v1;

import "common/v1/types.proto";

option go_package = "github.com/errebusorg/errebus/gen/go/sync/v1;syncv1";

// Sync Service handles client device tracking, change catch-up, and conflict management
service SyncService {
  // Registers a hardware client and issues or validates its identifier
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);

  // Lists all connected devices linked to the current user's profile
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);

  // Revokes a device's active session token to isolate it from future updates
  rpc RevokeDevice(RevokeDeviceRequest) returns (RevokeDeviceResponse);

  // Pulls a discrete ledger of system changes since the client's last active cursor
  rpc GetChanges(GetChangesRequest) returns (GetChangesResponse);

  // Initiates a long-running, bidirectional sync session between host and client
  rpc SyncSession(stream SyncMessage) returns (stream SyncMessage);

  // Returns all unresolved or historical conflict rows for a user's file space
  rpc ListConflicts(ListConflictsRequest) returns (ListConflictsResponse);

  // Applies an administrative strategy to collapse a file conflict state
  rpc ResolveConflict(ResolveConflictRequest) returns (ResolveConflictResponse);
}

// ============================================================================
// DEVICE MESSAGES
// ============================================================================

message RegisterDeviceRequest {
  common.v1.UserID user_id = 1;
  string device_name = 2; // Human-friendly name (e.g., MacBook Pro)
  string os = 3; // Runtime operating system environment
}

message RegisterDeviceResponse {
  common.v1.DeviceID device_id = 1;
  int64 sync_cursor = 2; // Last recorded sequence point for this client
}

message ListDevicesRequest {
  common.v1.UserID user_id = 1;
}

message DeviceInfo {
  common.v1.DeviceID device_id = 1;
  string device_name = 2;
  string os = 3;
  int64 sync_cursor = 4;
  common.v1.Timestamp last_sync_at = 5;
  common.v1.Timestamp registered_at = 6;
  string status = 7; // Status string matching database state
}

message ListDevicesResponse {
  repeated DeviceInfo devices = 1;
}

message RevokeDeviceRequest {
  common.v1.DeviceID device_id = 1;
  common.v1.UserID user_id = 2;
}

message RevokeDeviceResponse {
  bool success = 1;
}

// ============================================================================
// SYNC MESSAGES
// ============================================================================

message GetChangesRequest {
  common.v1.DeviceID device_id = 1;
  int64 since_cursor = 2; // Request delta starting exactly after this position
}

message ChangeEvent {
  string event_type = 1; // Operational tag (e.g., file.created, file.updated)
  common.v1.FileID file_id = 2;
  string path = 3;
  string name = 4;
  int64 size_bytes = 5;
  int32 version = 6;
  int64 sequence = 7; // Monotonic source event sequence index
  common.v1.Timestamp timestamp = 8; // Creation time mapping to event occurrence
}

message GetChangesResponse {
  repeated ChangeEvent changes = 1;
  int64 new_cursor = 2; // Advanced position value client should persist next
}

// Multiplexed packet framing used inside the bi-directional stream pipeline
message SyncMessage {
  string stream_session_id = 1;
  oneof payload {
    ChangeEvent change = 2;
    string heartbeat = 3;
  }
}

// ============================================================================
// CONFLICT MESSAGES
// ============================================================================

message ListConflictsRequest {
  common.v1.UserID user_id = 1;
}

message ConflictInfo {
  string conflict_id = 1;
  common.v1.FileID file_id = 2;
  common.v1.DeviceID device_id = 3;
  int32 server_version = 4;
  int32 client_version = 5;
  string conflict_copy_path = 6;
  string resolution = 7; // Resolution value (UNRESOLVED, KEEP_SERVER, etc.)
  common.v1.Timestamp created_at = 8;
}

message ListConflictsResponse {
  repeated ConflictInfo conflicts = 1;
}

message ResolveConflictRequest {
  string conflict_id = 1;
  string resolution_strategy = 2; // Desired selection strategy
}

message ResolveConflictResponse {
  bool success = 1;
}
