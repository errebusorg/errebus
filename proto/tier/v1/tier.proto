syntax = "proto3";

package tier.v1;

import "common/v1/types.proto";

option go_package = "github.com/errebusorg/errebus/gen/go/tier/v1;tierv1";

// Tier Service manages storage tier policies, assignments, and data restorations
service TierService {
  // Retrieves current storage tier information for a specific file or chunk
  rpc GetTierInfo(GetTierInfoRequest) returns (GetTierInfoResponse);

  // Triggers a high-priority background job to restore cold chunks back to hot tier
  rpc InitiateRestore(InitiateRestoreRequest) returns (InitiateRestoreResponse);

  // Polls the status of an ongoing multi-chunk file restoration job
  rpc GetRestoreStatus(GetRestoreStatusRequest) returns (GetRestoreStatusResponse);

  // Administrative RPC to update data lifecycle policy configurations
  rpc UpdatePolicy(UpdatePolicyRequest) returns (UpdatePolicyResponse);

  // Retrieves active data lifecycle policy configuration values
  rpc GetPolicy(GetPolicyRequest) returns (GetPolicyResponse);

  // Administrative RPC to retrieve data volume and metrics per storage tier
  rpc GetTierStats(GetTierStatsRequest) returns (GetTierStatsResponse);
}

// ============================================================================
// REQUEST & RESPONSE MESSAGES
// ============================================================================

message GetTierInfoRequest {
  string target_id = 1; // Can represent either a file ID or chunk ID
}

message GetTierInfoResponse {
  string tier = 1; // Active tier (e.g., hot, warm, cold)
  uint64 size_bytes = 2; // Total footprint size
}

// Request to pull a multi-chunk file out of deep cold archive
message InitiateRestoreRequest {
  common.v1.FileID file_id = 1; // File identifier to be restored
  common.v1.UserID user_id = 2; // Requesting user identity
}

// Immediate response containing tracking information for the restore pipeline
message InitiateRestoreResponse {
  string restore_job_id = 1; // Unique ID to poll for status updates
  int32 estimated_seconds = 2; // Estimated time remaining until fully warm
  string status = 3; // Initial state (typically PENDING)
}

message GetRestoreStatusRequest {
  string restore_job_id = 1;
}

// Current progression status of a file restoration lifecycle
message GetRestoreStatusResponse {
  string status = 1; // Current job state (PENDING, IN_PROGRESS, READY, FAILED)
  int32 total_chunks = 2; // Total cold chunks found in file manifest
  int32 completed_chunks = 3; // Count of chunks successfully brought to hot tier
  string error_message = 4; // Diagnostic message if status is FAILED
}

message UpdatePolicyRequest {
  string hot_to_warm_after = 1;
  string warm_to_cold_after = 2;
  uint64 min_file_size_for_tiering = 3;
}

message UpdatePolicyResponse {
  bool success = 1;
}

message GetPolicyRequest {}

message GetPolicyResponse {
  string hot_to_warm_after = 1;
  string warm_to_cold_after = 2;
  uint64 min_file_size_for_tiering = 3;
  string scan_interval = 4;
  int32 max_concurrent_migrations = 5;
}

message GetTierStatsRequest {}

// Usage overview stats across the independent storage tiers
message GetTierStatsResponse {
  uint64 hot_tier_bytes = 1;
  uint64 warm_tier_bytes = 2;
  uint64 cold_tier_bytes = 3;
  uint64 active_migration_jobs = 4;
}
